# --- Font Settings ---
# Use JetBrains Mono or any Nerd Font you have installed
font_family      PixelcraftNerdFont Nerd Font
bold_font        yes
font_size        11.0

# --- Window Aesthetics ---
# Padding around the text so it doesn't hug the screen edges
window_padding_width 5

# Window Size
remember_window_size yes
initial_window_height 400
initial_window_width 800

# Hide standard system title bars for a borderless, cleaner look
hide_window_decorations yes
confirm_os_window_close 0

notify_on_cmd_finish_invisible 20

# --- Cursor Customization ---
cursor_shape          block
cursor_blink_interval 0.5
# Modern smooth cursor trail effect
cursor_trail          3
cursor_trail_decay    0.1 0.4

mouse_hide_wait -3.0

# --- Tab Bar Styling ---
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_font_style   bold
inactive_tab_font_style normal

# --- Performance & Miscellaneous ---
repaint_delay    10
input_delay      3
sync_to_monitor  yes
enable_audio_bell no

allow_remote_control yes
listen_on unix:/tmp/kitty-socket

include ~/.cache/wal/colors-kitty.conf

# Subtle background transparency and blur (great for modern desktop environments)
background_opacity 0.85
background_blur    1

# Enable the splits layout alongside others
enabled_layouts splits,stack

# Create new split panes in the current directory
map ctrl+shift+e launch --location=vsplit --cwd=current
map ctrl+shift+o launch --location=hsplit --cwd=current

# Switch focus between panes using vim directions or arrows
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down
